# Azure Static Web Apps Deployment Workflow
# Purpose: Deploy plain HTML site from repository root (no build step)
# Author: Clean, production-ready configuration
# Notes:
# - Assumes index.html is located in the root of the repository
# - No frontend build tools (e.g., React, Angular) are used
# - No backend API (Azure Functions) is required

name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    if: github.event_name == 'push' || github.event.action != 'closed'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
          skip_app_build: true


