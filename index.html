<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitium Group</title>

    <style>
        /* === GLOBAL PAGE SETTINGS ===
           Deep navy background, white text, centered layout.
           Font: Segoe UI for consistency with Microsoft ecosystem.
        */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #0b1a33; /* Vitium deep navy */
            color: #ffffff;
            text-align: center;
        }

        /* === HEADER BAR ===
           Orange bar only (no grey above).
           Displays company name.
        */
        header {
            background-color: #f57c00; /* Vitium orange */
            padding: 12px 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* === NAVIGATION BAR ===
           Same orange tone for continuity.
           Simple horizontal links.
        */
        nav {
            background-color: #f57c00;
            padding: 8px 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 20px;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* === MAIN CONTAINER ===
           Controls vertical spacing below nav.
           Emblem positioned close to orange bar.
        */
        .container {
            margin-top: 10px; /* emblem sits ~10px below orange bar */
            padding: 0 20px;
        }

        /* === VERITAS EMBLEM ===
           Correct file reference and sizing.
           Positioned high for visual hierarchy.
        */
        .logo-veritas {
            width: 100px;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        /* === MISSION HEADER ===
           Orange text, slightly smaller than main headline.
        */
        h1 {
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #f57c00;
        }

        /* === ORANGE DIVIDER ===
           Thin horizontal line under “MISSION” header.
           Reinforces brand color and structure.
        */
        .divider {
            width: 280px;
            height: 1px;
            background-color: #f57c00;
            margin: 0 auto 15px auto;
        }

        /* === MISSION STATEMENT TEXT ===
           Centered, readable, light grey tone for contrast.
        */
        .mission {
            font-size: 16px;
            max-width: 750px;
            margin: 0 auto;
            line-height: 1.6;
            color: #dcdcdc;
        }

        /* === FOOTER ===
           Fixed at bottom, orange background, small text.
        */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #f57c00;
            padding: 10px 0;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <!-- === HEADER SECTION === -->
    <header>
        VITIUM GROUP
    </header>

    <!-- === NAVIGATION LINKS === -->
    <nav>
        <a href="/index.html">Home</a>
        <a href="/frontend/about.html">About</a>
        <a href="/frontend/operations.html">Operations</a>
        <a href="/frontend/contact.html">Contact</a>
        <a href="/frontend/console.html">System Access</a>
    </nav>

    <!-- === MAIN CONTENT AREA === -->
    <div class="container">

        <!-- CORRECT VERITAS EMBLEM (10px BELOW ORANGE BAR) -->
        <img src="assets/logos/VITIUM-VERITAS_symbol_100-LOGO.png" class="logo-veritas" alt="VERITAS Emblem">

        <!-- MISSION HEADER -->
        <h1>MISSION</h1>

        <!-- ORANGE DIVIDER LINE -->
        <div class="divider"></div>

        <!-- MISSION STATEMENT -->
        <p class="mission">
            To provide a secure, tamper‑resistant, real‑time evidence platform that empowers teams, protects organisations, and ensures accountability at every level.
        </p>

    </div>

    <!-- === FOOTER SECTION === -->
    <footer>
        © 2026 Vitium Group. All rights reserved.
    </footer>

</body>
</html>
