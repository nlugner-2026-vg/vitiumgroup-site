<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VERITAS 1.0 – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Correct stylesheet path -->
  <link rel="stylesheet" href="frontend/styles.css" />

  <style>
    /* NAV BAR — Light Teal VERITAS Premium */
    .nav-bar {
      width: 100%;
      background: #f0f7f8;
      padding: 14px 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-left img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .nav-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #004b5a;
      letter-spacing: 0.04em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 0.95rem;
      color: #004b5a;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 6px 4px;
      border-radius: 6px;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      color: #00a8ff;
    }

    /* PAGE BODY — FIXED: NO DOOM BACKGROUND */
    body {
      margin: 0;
      background: #f0f7f8; /* Light teal doctrine */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #004b5a;
    }

    .page-container {
      padding: 40px 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 26px;
    }

    .veritas-emblem {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
    }

    .welcome-title {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #004b5a;
    }

    .welcome-sub {
      font-size: 1rem;
      color: #3a4a52;
      max-width: 600px;
      line-height: 1.6;
    }

    .enter-button {
      margin-top: 10px;
      padding: 12px 26px;
      background: #00a8ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }

    .enter-button:hover {
      background: #0095e0;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION BAR -->
  <nav class="nav-bar">
    <div class="nav-left">
      <img src="frontend/assets/logos/WIJ-logo-150x150.webp" alt="WIJ logo" />
      <div class="nav-title">VERITAS 1.0</div>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="frontend/dashboard.html">Dashboard</a>
      <a href="frontend/dashboard.html#alerts">Alerts</a>
      <a href="frontend/dashboard.html#metrics">Metrics</a>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="page-container">
    <img
      src="frontend/assets/logos/VITIUM-VERITAS_symbol_100-LOGO.png"
      alt="VERITAS emblem"
      class="veritas-emblem"
    />

    <div class="welcome-title">Welcome to VERITAS 1.0</div>

    <div class="welcome-sub">
      Unified Resilience Network — WIJ Corridor Demonstration Environment.<br />
      This interface provides access to the operational dashboard, alerts, and performance metrics.
    </div>

    <a href="frontend/dashboard.html" class="enter-button">Enter Dashboard</a>
  </div>

</body>
</html>
