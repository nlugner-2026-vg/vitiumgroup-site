<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitium Group</title>

    <style>
        /* === GLOBAL PAGE SETTINGS === */
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #0b1a33;
            color: #ffffff;
            text-align: center;
        }

        /* === GREY BAR ABOVE ORANGE MENU BAR ===
           Height matched EXACTLY to nav bar.
        */
        header {
            background-color: #e5e5e5;
            padding: 8px 0;   /* MATCHED HEIGHT */
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #000;
        }

        /* === ORANGE NAVIGATION BAR ===
           Height matched EXACTLY to grey bar.
        */
        nav {
            background-color: #f57c00;
            padding: 8px 0;   /* MATCHED HEIGHT */
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 18px;
            font-weight: 500;
            font-size: 15px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* === MAIN CONTENT === */
        .container {
            margin-top: 30px;
            padding: 0 20px;
        }

        /* === VERITAS EMBLEM === */
        .logo-veritas {
            width: 100px;
            margin-top: 20px;
            margin-bottom: 25px;
        }

        /* === MISSION HEADER === */
        h1 {
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #f57c00;
        }

        /* === FULL-WIDTH ORANGE DIVIDER === */
        .divider {
            width: 750px;
            height: 1px;
            background-color: #f57c00;
            margin: 0 auto 15px auto;
        }

        /* === MISSION STATEMENT === */
        .mission {
            font-size: 16px;
            max-width: 750px;
            margin: 0 auto;
            line-height: 1.6;
            color: #dcdcdc;
        }

        /* === FOOTER === */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #f57c00;
            padding: 10px 0;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <!-- GREY BAR ABOVE ORANGE MENU BAR -->
    <header>
        VITIUM GROUP
    </header>

    <!-- ORANGE MENU BAR (HEIGHT MATCHED TO GREY BAR) -->
    <nav>
        <a href="/index.html">Home</a>
        <a href="/frontend/about.html">About</a>
        <a href="/frontend/operations.html">Operations</a>
        <a href="/frontend/contact.html">Contact</a>
        <a href="/frontend/console.html">System Access</a>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">

        <!-- VERITAS EMBLEM -->
        <img src="assets/logos/VITIUM-VERITAS_symbol_100-LOGO.png" class="logo-veritas" alt="VERITAS Emblem">

        <!-- MISSION HEADER -->
        <h1>MISSION</h1>

        <!-- FULL-WIDTH ORANGE DIVIDER -->
        <div class="divider"></div>

        <!-- MISSION STATEMENT -->
        <p class="mission">
            To provide a secure, tamper‑resistant, real‑time evidence platform that empowers teams, protects organisations, and ensures accountability at every level.
        </p>

    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 Vitium Group. All rights reserved.
    </footer>

</body>
</html>
