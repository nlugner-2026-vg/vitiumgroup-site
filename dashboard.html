<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vitium Veritas™ Access Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --vv-bg: #0b1628;
      --vv-surface: #0b1628;
      --vv-border-subtle: #1f2937;
      --vv-text-main: #e5e7eb;
      --vv-text-muted: #9ca3af;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--vv-bg);
      color: var(--vv-text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .vv-page {
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--vv-bg);
    }

    /* HEADER (brand + operator ID) */
    .vv-header-top {
      background: #7A7A7A;
      text-align: center;
      padding: 10px 0 6px;
      border-bottom: 1px solid var(--vv-border-subtle);
    }

    .vv-header-top .vv-brand {
      display: block;
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-size: 1rem;
    }

    .vv-header-top .vv-operator-id {
      display: block;
      color: #60a5fa;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    /* NAV BAR (dark section below header) */
    .vv-navbar {
      background: #0b1628;
      text-align: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--vv-border-subtle);
    }

    .vv-navbar .nav-link {
      color: #ffffff !important;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0 10px;
    }

    .vv-navbar .nav-link.active {
      text-decoration: underline;
    }

    .navbar-toggler-icon {
      background-image: none;
      width: 20px;
      height: 2px;
      box-shadow: 0 6px 0 0 #e5e7eb, 0 -6px 0 0 #e5e7eb;
      background-color: #e5e7eb;
    }

    /* HEADER ROW (logos) */
    .vv-header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 200px;
      width: 100%;
      padding: 16px 0;
      background: var(--vv-surface);
    }

    .vv-header-wij,
    .vv-header-veritas {
      height: 100px;
    }

    /* MAIN */
    .vv-main {
      flex: 1 0 auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 12px 40px;
    }

    /* ACCESS CARD */
    .vv-card {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #cccccc;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      padding: 20px 18px;
      color: #111111;
    }

    .vv-card-header {
      text-align: center;
      margin-bottom: 12px;
    }

    .vv-card-header p {
      font-size: 0.8rem;
      color: #333333;
      margin: 0;
    }

    .vv-input {
      width: 100%;
      border: 1px solid #aaaaaa;
      border-radius: 4px;
      padding: 6px 8px;
      margin: 10px 0 12px;
      font-size: 0.9rem;
    }

    /* KEYPAD */
    .vv-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .vv-keypad button {
      background: #0b3a6a;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 10px 0;
      font-size: 1rem;
      cursor: pointer;
    }

    .vv-keypad button:hover {
      background: #0e4a8a;
    }

    .vv-btn-unlock {
      width: 100%;
      background: #333333;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 10px 0;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 6px;
    }

    .vv-btn-unlock:hover {
      background: #222222;
    }

    /* FOOTER */
    .vv-footer {
      flex-shrink: 0;
      padding: 10px 16px 14px;
      font-size: 0.7rem;
      color: var(--vv-text-muted);
      text-align: center;
      border-top: 1px solid rgba(15, 23, 42, 0.9);
      background: #0b1628;
    }
  </style>
</head>

<body>
<div class="vv-page">

  <!-- HEADER TOP -->
  <div class="vv-header-top">
    <span class="vv-brand">Vitium Veritas™</span>
    <span class="vv-operator-id">Operator ID: OP‑2741</span>
  </div>

  <!-- NAV BAR -->
  <nav class="navbar navbar-expand-md vv-navbar">
    <div class="container-fluid justify-content-center">
      <button class="navbar-toggler text-light border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#vvNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-center" id="vvNavbar">
        <ul class="navbar-nav mb-2 mb-md-0">
          <li class="nav-item"><a class="nav-link active" href="./dashboard.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="./evidence.html">Evidence</a></li>
          <li class="nav-item"><a class="nav-link" href="./about.html">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HEADER ROW -->
  <div class="vv-header-row">
    <img src="assets/logos/WIJ-logo-150x150.webp" alt="Water Industry Journal Logo" class="vv-header-wij">
    <img src="assets/logos/VITIUM-VERITAS_symbol_100-LOGO.png" alt="Vitium Veritas Emblem" class="vv-header-veritas">
  </div>

  <!-- MAIN -->
  <main class="vv-main">
    <div class="vv-card">
      <div class="vv-card-header">
        <p>Enter your PIN to unlock your session</p>
      </div>

      <input type="password" id="vv-pin-input" class="vv-input"
             placeholder="Enter PIN" maxlength="6" inputmode="numeric">

      <div class="vv-keypad">
        <button data-key="1">1</button>
        <button data-key="2">2</button>
        <button data-key="3">3</button>

        <button data-key="4">4</button>
        <button data-key="5">5</button>
        <button data-key="6">6</button>

        <button data-key="7">7</button>
        <button data-key="8">8</button>
        <button data-key="9">9</button>

        <button data-key="clear">C</button>
        <button data-key="0">0</button>
        <button data-key="back">←</button>
      </div>

      <button class="vv-btn-unlock" id="vv-unlock-btn">✓ Unlock</button>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="vv-footer">
    Vitium Veritas™ · Evidence-grade digital assurance · All access attempts are recorded.
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function () {

  const input = document.getElementById('vv-pin-input');
  const buttons = document.querySelectorAll('.vv-keypad button');
  const unlockBtn = document.getElementById('vv-unlock-btn');

  function appendDigit(d) {
    if (input.value.length < input.maxLength) input.value += d;
  }

  function backspace() {
    input.value = input.value.slice(0, -1);
  }

  function clearInput() {
    input.value = '';
  }

  function unlock() {
    const pin = input.value;
    verifyPIN(pin);
  }

  function verifyPIN(pin) {
    if (pin === '1937') {
      window.location.href = './evidence.html';
    } else {
      alert('Invalid PIN');
    }
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;

      if (key === 'back') return backspace();
      if (key === 'clear') return clearInput();

      appendDigit(key);
    });
  });

  unlockBtn.addEventListener('click', unlock);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      unlock();
    }
  });

})();
</script>

</body>
</html>
