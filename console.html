<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERITAS Corridor Console</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <h1>VERITAS Corridor Console</h1>
    <p>Authenticated Operator Session</p>
  </header>

  <main class="console-main">

    <section class="panel">
      <h2>System Status</h2>
      <div id="health" class="status-box">Checking...</div>
    </section>

    <section class="panel">
      <h2>Corridor Modules</h2>
      <ul id="module-list" class="module-list"></ul>
    </section>

  </main>

  <script src="console.js"></script>
</body>
</html>
