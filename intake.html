<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERITAS Intake Form – Vitium Group</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-left">
            <a href="index.html">
                <img src="assets/vitium-logo.png" alt="Vitium Group Logo" class="logo">
            </a>
        </div>
        <div class="navbar-right">
            <a href="index.html">Home</a>
            <a href="learn-more.html">Learn More</a>
            <a href="intake.html" class="active">Intake</a>
        </div>
    </nav>

    <!-- Emblem Block (matches index.html exactly) -->
    <div class="emblem-container">
        <img src="assets/veritas-emblem.png" alt="VERITAS Emblem" class="emblem">
    </div>

    <!-- Page Title -->
    <h1 class="page-title">VERITAS Intake Form</h1>

    <!-- Two‑Column Form Layout -->
    <div class="content-container">

        <div class="intake-form">

            <!-- LEFT COLUMN: Contact Details -->
            <div class="contact-details">
                <h3>Your Details</h3>

                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="organisation">Organisation</label>
                <input type="text" id="organisation" name="organisation">

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label for="role">Role / Position</label>
                <input type="text" id="role" name="role">

                <label for="message">Message (300 characters max)</label>
                <textarea id="message" name="message" maxlength="300" rows="5"></textarea>
            </div>

            <!-- RIGHT COLUMN: Main Intake Fields -->
            <div class="form-fields">

                <label for="sector">Select Sector</label>
                <select id="sector" name="sector" required>
                    <option value="">-- Select a Sector --</option>
                    <option>Cyber Defence</option>
                    <option>Physical Security</option>
                    <option>Counter‑Fraud</option>
                    <option>Financial Crime</option>
                    <option>Insider Threat</option>
                    <option>Operational Risk</option>
                    <option>Governance</option>
                    <option>Compliance</option>
                    <option>Intelligence</option>
                    <option>Threat Monitoring</option>
                    <option>Due Diligence</option>
                    <option>Audit</option>
                    <option>Assurance</option>
                    <option>Business Continuity</option>
                    <option>Resilience</option>
                </select>

                <label for="details">Case / Requirement Details</label>
                <textarea id="details" name="details" rows="8" required></textarea>

                <button type="submit" class="submit-btn">Submit Intake</button>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Vitium Group. All rights reserved.</p>
    </footer>

</body>
</html>
