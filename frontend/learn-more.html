<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vitium Group – Learn More</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg-main: #0b1220;
            --bg-card: #111827;
            --accent: #f97316;
            --accent-soft: #fed7aa;
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --border-soft: #374151;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%);
            color: var(--text-main);
        }

        header {
            background: #020617;
            border-bottom: 1px solid #1f2937;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header .logo {
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        header nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
        }

        header nav a:hover {
            color: var(--accent);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* ORIGINAL 3‑COLUMN DESKTOP GRID */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.25rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--bg-card);
            border-radius: 0.75rem;
            border: 1px solid var(--border-soft);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            min-height: 180px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-soft);
            margin-bottom: 0.35rem;
        }

        .card-body {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .card-tag {
            margin-top: 0.75rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
        }

        /* FORM */
        .form-section {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 0.75rem;
            border: 1px solid var(--border-soft);
            padding: 1.75rem 1.5rem;
        }

        .form-section h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .form-section p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.5rem 0.6rem;
            border-radius: 0.4rem;
            border: 1px solid #1f2937;
            background: #020617;
            color: var(--text-main);
            font-size: 0.85rem;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }
